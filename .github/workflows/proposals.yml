name: Build Changed Proposals

on:
  push:
    paths:
      - 'proposals/**'
  workflow_dispatch:
    inputs:
      proposal:
        description: 'Proposal name to build (leave empty to build all)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  PANDOC_VERSION: 3.1.13
  # SHA-256 digests for supply-chain integrity — re-compute when upgrading versions
  PANDOC_SHA: b51029afd2e302679aabb9464cd96bda378145d48bb853bd32d93c57b93a293d
  CROSSREF_VERSION: 0.3.17.1
  CROSSREF_SHA: 52a21ef8945e664e7ccfea5f40268db3e3ddee4e7ce1f47f24716fea37c2410e

jobs:
  detect:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      proposals: ${{ steps.detect.outputs.proposals }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # fetch-depth: 2 — requires HEAD and HEAD~1 to compute git diff for change detection.
          fetch-depth: 2

      - name: Detect changed proposals
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ inputs.proposal }}"
            if [ -n "$INPUT" ]; then
              PROPOSALS="[\"$INPUT\"]"
            else
              PROPOSALS=$(ls -d proposals/*/config.yaml 2>/dev/null \
                | cut -d'/' -f2 \
                | grep -v '^\.' \
                | jq -Rn '[inputs | select(length > 0)]')
            fi
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
            PROPOSALS=$(echo "$CHANGED" \
              | grep '^proposals/' \
              | cut -d'/' -f2 \
              | sort -u \
              | grep -v '^\.' \
              | jq -Rn '[inputs | select(length > 0)]')
          else
            CHANGED=$(git ls-files proposals/)
            PROPOSALS=$(echo "$CHANGED" \
              | grep '^proposals/' \
              | cut -d'/' -f2 \
              | sort -u \
              | grep -v '^\.' \
              | jq -Rn '[inputs | select(length > 0)]')
          fi
          echo "proposals=$PROPOSALS" >> $GITHUB_OUTPUT
          echo "Detected: $PROPOSALS"

  build:
    needs: detect
    if: needs.detect.outputs.proposals != '[]' && needs.detect.outputs.proposals != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        proposal: ${{ fromJson(needs.detect.outputs.proposals) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Cache pandoc deb
        id: cache-pandoc
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb
          key: pandoc-${{ env.PANDOC_VERSION }}

      - name: Download pandoc
        if: steps.cache-pandoc.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o "pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb" \
            "https://github.com/jgm/pandoc/releases/download/${{ env.PANDOC_VERSION }}/pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb"

      - name: Install pandoc
        run: |
          echo "${{ env.PANDOC_SHA }}  pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb" | sha256sum -c -
          sudo dpkg -i "pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb"

      - name: Cache pandoc-crossref
        id: cache-crossref
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: pandoc-crossref-Linux.tar.xz
          key: pandoc-crossref-${{ env.CROSSREF_VERSION }}

      - name: Download pandoc-crossref
        if: steps.cache-crossref.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o pandoc-crossref-Linux.tar.xz \
            "https://github.com/lierdakil/pandoc-crossref/releases/download/v${{ env.CROSSREF_VERSION }}/pandoc-crossref-Linux.tar.xz"

      - name: Install pandoc-crossref
        run: |
          echo "${{ env.CROSSREF_SHA }}  pandoc-crossref-Linux.tar.xz" | sha256sum -c -
          tar -xf "pandoc-crossref-Linux.tar.xz"
          sudo mv pandoc-crossref /usr/local/bin/

      - name: Cache apt packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu-24.04-texlive-v1

      - name: Install XeLaTeX and PDF utilities
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-extra \
            lmodern \
            poppler-utils

      - name: Cache npm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: npm-mermaid-cli-11.12.0-markdownlint-0.48.0

      - name: Setup Chrome for mmdc
        uses: browser-actions/setup-chrome@4f8e94349a351df0f048634f25fec36c3c91eded # v2.1.1
        id: setup-chrome

      - name: Configure mmdc for pandoc (puppeteer + no-sandbox)
        # Creates a Puppeteer config pointing at the runner's Chrome binary, then writes a
        # wrapper script (mmdc-pandoc) that injects --puppeteerConfigFile and --theme before
        # forwarding all arguments to mmdc. filters/diagram.lua invokes this wrapper via
        # MERMAID_BIN. The --no-sandbox flag is required on Ubuntu 24.04+ because AppArmor
        # restricts unprivileged user namespaces used by Chrome's zygote process.
        # Reference: https://github.com/mermaid-js/mermaid-cli/blob/master/docs/already-installed-chromium.md
        # Reference: https://pptr.dev/guides/configuration
        run: |
          printf '{"executablePath":"%s","args":["--no-sandbox","--disable-setuid-sandbox"]}\n' \
            "${{ steps.setup-chrome.outputs.chrome-path }}" > /tmp/mmdc-puppeteer.json
          printf '#!/bin/sh\nexec mmdc --puppeteerConfigFile /tmp/mmdc-puppeteer.json --theme "${MERMAID_THEME:-default}" "$@"\n' \
            > /usr/local/bin/mmdc-pandoc
          chmod +x /usr/local/bin/mmdc-pandoc
          echo "MERMAID_BIN=/usr/local/bin/mmdc-pandoc" >> $GITHUB_ENV
          echo "PUPPETEER_EXECUTABLE_PATH=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV
          echo "PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true" >> $GITHUB_ENV

      - name: Install Node.js tools
        run: npm install -g --no-fund --no-audit @mermaid-js/mermaid-cli@11.12.0 markdownlint-cli@0.48.0

      - name: Install Python tools
        # GitHub Actions runners execute as a non-root user; pip installs to ~/.local (user
        # site-packages) and does not trigger PEP 668's externally-managed-environment guard.
        # venv is required in Docker (root user) and the devcontainer; not needed here.
        # --constraint uses requirements-dev.txt as a version pin, not an install list —
        # only codespell is installed; pre-commit (also in requirements-dev.txt) is not
        # installed in CI because it is a developer workflow tool, not a build tool.
        # Reference: pip constraints files — https://pip.pypa.io/en/stable/user_guide/#constraints-files
        # Reference: PEP 668 — https://peps.python.org/pep-0668/
        run: pip install --constraint requirements-dev.txt codespell

      - name: Lint markdown
        run: make lint PROPOSAL="${{ matrix.proposal }}"

      - name: Spell check
        run: make spellcheck PROPOSAL="${{ matrix.proposal }}"

      - name: Lint shell scripts (ShellCheck)
        run: |
          sudo apt-get update -q && sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck -x scripts/*.sh scripts/lib/*.sh

      - name: Build PDF
        run: make build PROPOSAL="${{ matrix.proposal }}"

      - name: Build HTML
        run: make html PROPOSAL="${{ matrix.proposal }}"

      - name: Build DOCX
        run: make docx PROPOSAL="${{ matrix.proposal }}"

      - name: Validate outputs
        run: |
          PDF="proposals/${{ matrix.proposal }}/project.pdf"
          HTML="proposals/${{ matrix.proposal }}/project.html"
          DOCX="proposals/${{ matrix.proposal }}/project.docx"

          test -s "$PDF"  || { echo "FAIL: PDF not produced for ${{ matrix.proposal }}";  exit 1; }
          test -s "$HTML" || { echo "FAIL: HTML not produced for ${{ matrix.proposal }}"; exit 1; }
          test -s "$DOCX" || { echo "FAIL: DOCX not produced for ${{ matrix.proposal }}"; exit 1; }

          pdfinfo "$PDF"

          PAGES=$(pdfinfo "$PDF" | awk '/^Pages:/{print $2}')
          echo "Page count: $PAGES"
          [ "$PAGES" -ge 1 ] || { echo "FAIL: PDF appears empty ($PAGES pages)"; exit 1; }

          pdftotext "$PDF" - > /tmp/pdf-text.txt
          grep -q "Introduction"      /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Introduction'";      exit 1; }
          grep -q "Context"           /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Context'";           exit 1; }
          grep -q "Solution Strategy" /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Solution Strategy'"; exit 1; }
          grep -q "Building Block"    /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Building Block'";    exit 1; }
          grep -q "Deployment"        /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Deployment'";        exit 1; }
          grep -q "Risks"             /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Risks'";             exit 1; }
          grep -q "References"        /tmp/pdf-text.txt || { echo "FAIL: Missing section 'References'";        exit 1; }

          grep -qi "<h1" "$HTML" || { echo "FAIL: HTML missing heading content"; exit 1; }

          echo "Outputs validated for ${{ matrix.proposal }}."

      - name: Upload proposal artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.proposal }}
          path: |
            proposals/${{ matrix.proposal }}/project.pdf
            proposals/${{ matrix.proposal }}/project.html
            proposals/${{ matrix.proposal }}/project.docx
          retention-days: 30
