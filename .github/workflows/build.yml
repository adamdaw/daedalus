name: Build & Validate PDF

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default all permissions to none; each job grants only what it needs.
permissions: {}

env:
  PANDOC_VERSION: 3.1.13
  # SHA-256 digests for supply-chain integrity — re-compute when upgrading versions
  PANDOC_SHA: b51029afd2e302679aabb9464cd96bda378145d48bb853bd32d93c57b93a293d
  CROSSREF_VERSION: 0.3.17.1
  CROSSREF_SHA: 52a21ef8945e664e7ccfea5f40268db3e3ddee4e7ce1f47f24716fea37c2410e

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # persist-credentials: false — removes the GITHUB_TOKEN git credential from the
          # git config after checkout. No git push is performed in this job; removing the
          # credential limits exposure if a subsequent step is compromised.
          # Reference: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
          persist-credentials: false
          # fetch-depth: 1 (shallow clone) — only the latest commit is needed for building.
          # Explicit declaration makes the intent auditable.
          fetch-depth: 1

      - name: Cache pandoc deb
        id: cache-pandoc
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb
          key: pandoc-${{ env.PANDOC_VERSION }}

      - name: Download pandoc
        if: steps.cache-pandoc.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o "pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb" \
            "https://github.com/jgm/pandoc/releases/download/${{ env.PANDOC_VERSION }}/pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb"

      - name: Install pandoc
        run: |
          echo "${{ env.PANDOC_SHA }}  pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb" | sha256sum -c -
          sudo dpkg -i "pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb"
          pandoc --version

      - name: Cache pandoc-crossref
        id: cache-crossref
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: pandoc-crossref-Linux.tar.xz
          key: pandoc-crossref-${{ env.CROSSREF_VERSION }}

      - name: Download pandoc-crossref
        if: steps.cache-crossref.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o pandoc-crossref-Linux.tar.xz \
            "https://github.com/lierdakil/pandoc-crossref/releases/download/v${{ env.CROSSREF_VERSION }}/pandoc-crossref-Linux.tar.xz"

      - name: Install pandoc-crossref
        run: |
          echo "${{ env.CROSSREF_SHA }}  pandoc-crossref-Linux.tar.xz" | sha256sum -c -
          tar -xf "pandoc-crossref-Linux.tar.xz"
          sudo mv pandoc-crossref /usr/local/bin/
          pandoc-crossref --version

      - name: Cache apt packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu-24.04-texlive-v1

      - name: Install XeLaTeX and PDF utilities
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-extra \
            lmodern \
            poppler-utils

      - name: Cache npm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: npm-mermaid-cli-11.12.0-markdownlint-0.48.0

      - name: Setup Chrome for mmdc
        uses: browser-actions/setup-chrome@4f8e94349a351df0f048634f25fec36c3c91eded # v2.1.1
        id: setup-chrome

      - name: Configure mmdc for pandoc (puppeteer + no-sandbox)
        # Creates a Puppeteer config pointing at the runner's Chrome binary, then writes a
        # wrapper script (mmdc-pandoc) that injects --puppeteerConfigFile and --theme before
        # forwarding all arguments to mmdc. filters/diagram.lua invokes this wrapper via
        # MERMAID_BIN. The --no-sandbox flag is required on Ubuntu 24.04+ because AppArmor
        # restricts unprivileged user namespaces used by Chrome's zygote process.
        # Reference: https://github.com/mermaid-js/mermaid-cli/blob/master/docs/already-installed-chromium.md
        # Reference: https://pptr.dev/guides/configuration
        run: |
          printf '{"executablePath":"%s","args":["--no-sandbox","--disable-setuid-sandbox"]}\n' \
            "${{ steps.setup-chrome.outputs.chrome-path }}" > /tmp/mmdc-puppeteer.json
          printf '#!/bin/sh\nexec mmdc --puppeteerConfigFile /tmp/mmdc-puppeteer.json --theme "${MERMAID_THEME:-default}" "$@"\n' \
            > /usr/local/bin/mmdc-pandoc
          chmod +x /usr/local/bin/mmdc-pandoc
          echo "MERMAID_BIN=/usr/local/bin/mmdc-pandoc" >> $GITHUB_ENV
          echo "PUPPETEER_EXECUTABLE_PATH=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV
          echo "PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true" >> $GITHUB_ENV

      - name: Install Node.js tools
        run: npm install -g --no-fund --no-audit @mermaid-js/mermaid-cli@11.12.0 markdownlint-cli@0.48.0

      - name: Install Python tools
        # GitHub Actions runners execute as a non-root user; pip installs to ~/.local (user
        # site-packages) and does not trigger PEP 668's externally-managed-environment guard.
        # venv is required in Docker (root user) and the devcontainer; not needed here.
        # --constraint uses requirements-dev.txt as a version pin, not an install list —
        # only codespell is installed; pre-commit (also in requirements-dev.txt) is not
        # installed in CI because it is a developer workflow tool, not a build tool.
        # Reference: pip constraints files — https://pip.pypa.io/en/stable/user_guide/#constraints-files
        # Reference: PEP 668 — https://peps.python.org/pep-0668/
        run: pip install --constraint requirements-dev.txt codespell

      - name: Lint markdown
        run: make lint

      - name: Spell check
        run: make spellcheck

      - name: Lint shell scripts (ShellCheck)
        run: |
          sudo apt-get update -q && sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck scripts/*.sh

      - name: Run Lua filter integration tests
        run: bash test/lua/run_tests.sh

      - name: Build PDF
        run: make build

      - name: Build HTML
        run: make html

      - name: Build DOCX
        run: make docx

      - name: Validate PDF
        run: |
          test -s project.pdf || { echo "FAIL: PDF not generated or is empty"; exit 1; }

          pdfinfo project.pdf

          PAGES=$(pdfinfo project.pdf | awk '/^Pages:/{print $2}')
          echo "Page count: $PAGES"
          [ "$PAGES" -ge 5 ] || { echo "FAIL: Expected at least 5 pages, got $PAGES"; exit 1; }

          pdftotext project.pdf - > /tmp/pdf-text.txt
          grep -q "Introduction"     /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Introduction'";     exit 1; }
          grep -q "Context"          /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Context'";          exit 1; }
          grep -q "Solution Strategy" /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Solution Strategy'"; exit 1; }
          grep -q "Building Block"   /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Building Block'";   exit 1; }
          grep -q "Deployment"       /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Deployment'";       exit 1; }
          grep -q "Risks"            /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Risks'";            exit 1; }
          grep -q "References"       /tmp/pdf-text.txt || { echo "FAIL: Missing section 'References'";       exit 1; }

          echo "All validation checks passed."

      - name: Upload PDF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: proposal-pdf
          path: project.pdf
          retention-days: 30

      - name: Validate HTML
        run: |
          test -s project.html || { echo "FAIL: HTML not generated or is empty"; exit 1; }
          grep -qi "<h1" project.html || { echo "FAIL: HTML missing heading content"; exit 1; }
          echo "HTML validation passed."

      - name: Upload HTML artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: proposal-html
          path: project.html
          retention-days: 30

      - name: Validate DOCX
        run: |
          test -s project.docx || { echo "FAIL: DOCX not generated or is empty"; exit 1; }
          echo "DOCX validation passed."

      - name: Upload DOCX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: proposal-docx
          path: project.docx
          retention-days: 30

  test-elicitation:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install test tools and make scripts executable
        run: |
          sudo apt-get update -q && sudo apt-get install -y --no-install-recommends shellcheck bats
          gem install --no-document bashcov simplecov-cobertura
          pip install --constraint requirements-dev.txt pytest
          chmod +x scripts/*.sh test/lua/run_tests.sh

      - name: Lint shell scripts (ShellCheck)
        run: shellcheck scripts/*.sh

      - name: Run bats unit tests with coverage (bashcov)
        run: bashcov -- bats test/scripts/*.bats

      - name: Run Python unit tests (pytest)
        run: python3 -m pytest test/python/ -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Run gather-requirements (non-AI fallback — Prompt 06 / /req-* commands)
        # Strips comment lines (starting with #) from the fixture before piping to the script.
        # The script reads each answer from stdin in the same order as its read() calls.
        run: |
          mkdir -p proposals/ci-elicitation-test/markdown
          grep -v '^#' test/fixtures/requirements-answers.txt | \
            bash scripts/gather-requirements.sh proposals/ci-elicitation-test/requirements.md

      - name: Run gather-brief (non-AI fallback — /gather-* commands)
        # Run from the proposal directory so gather-brief.sh detects requirements.md
        # and skips re-gathering requirements and constraints.
        working-directory: proposals/ci-elicitation-test
        run: |
          grep -v '^#' ../../test/fixtures/brief-answers.txt | \
            bash ../../scripts/gather-brief.sh brief.md

      - name: Validate elicitation artifacts
        run: |
          bash scripts/validate-artifacts.sh \
            --requirements proposals/ci-elicitation-test/requirements.md \
            --brief proposals/ci-elicitation-test/brief.md

      - name: Run progress dashboard
        run: |
          bash scripts/progress.sh \
            --requirements proposals/ci-elicitation-test/requirements.md \
            --brief proposals/ci-elicitation-test/brief.md

      - name: Run readiness check
        run: |
          bash scripts/validate-artifacts.sh --ready \
            --requirements proposals/ci-elicitation-test/requirements.md \
            --brief proposals/ci-elicitation-test/brief.md

      - name: Assemble arc42 markdown (non-AI fallback — Prompt 01)
        run: bash scripts/assemble.sh --proposal ci-elicitation-test

      - name: Verify assembled output
        # All 12 arc42 files must be present and non-empty.
        # Section headings are verified to ensure the assembler wrote meaningful content.
        run: |
          outdir="proposals/ci-elicitation-test/markdown"
          expected=(
            "01_Introduction_and_Goals.md"
            "02_Constraints.md"
            "03_Context_and_Scope.md"
            "04_Solution_Strategy.md"
            "05_Building_Block_View.md"
            "06_Runtime_View.md"
            "07_Deployment_View.md"
            "08_Crosscutting_Concepts.md"
            "09_Architecture_Decisions.md"
            "10_Quality_Requirements.md"
            "11_Risks_and_Technical_Debt.md"
            "99_References.md"
          )
          for f in "${expected[@]}"; do
            test -s "${outdir}/${f}" || { echo "FAIL: ${f} missing or empty"; exit 1; }
          done
          grep -q "Introduction"    "${outdir}/01_Introduction_and_Goals.md" || { echo "FAIL: §01 missing heading"; exit 1; }
          grep -q "Context"         "${outdir}/03_Context_and_Scope.md"       || { echo "FAIL: §03 missing heading"; exit 1; }
          grep -q "Solution"        "${outdir}/04_Solution_Strategy.md"       || { echo "FAIL: §04 missing heading"; exit 1; }
          grep -q "Building Block"  "${outdir}/05_Building_Block_View.md"     || { echo "FAIL: §05 missing heading"; exit 1; }
          grep -q "Deployment"      "${outdir}/07_Deployment_View.md"         || { echo "FAIL: §07 missing heading"; exit 1; }
          grep -q "Risks"           "${outdir}/11_Risks_and_Technical_Debt.md" || { echo "FAIL: §11 missing heading"; exit 1; }
          echo "All 12 arc42 files present and valid."

  docker:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Capture OCI label metadata
        # Captures the current UTC timestamp and commit SHA for OCI image labels.
        # BUILD_DATE and VCS_REF populate org.opencontainers.image.created and .revision,
        # providing full build provenance in the image manifest.
        # OCI Image Spec annotations — https://github.com/opencontainers/image-spec/blob/main/annotations.md
        id: oci-meta
        run: |
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: |
            daedalus:latest
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          build-args: |
            BUILD_DATE=${{ steps.oci-meta.outputs.date }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run build inside Docker
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/workspace" daedalus

      - name: Install PDF utilities
        run: sudo apt-get install -y --no-install-recommends poppler-utils

      - name: Validate Docker outputs
        run: |
          test -s project.pdf  || { echo "FAIL: Docker build did not produce project.pdf";  exit 1; }
          test -s project.html || { echo "FAIL: Docker build did not produce project.html"; exit 1; }
          test -s project.docx || { echo "FAIL: Docker build did not produce project.docx"; exit 1; }

          pdfinfo project.pdf

          PAGES=$(pdfinfo project.pdf | awk '/^Pages:/{print $2}')
          echo "Page count: $PAGES"
          [ "$PAGES" -ge 5 ] || { echo "FAIL: Expected at least 5 pages, got $PAGES"; exit 1; }

          pdftotext project.pdf - > /tmp/pdf-text.txt
          grep -q "Introduction"      /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Introduction'";      exit 1; }
          grep -q "Context"           /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Context'";           exit 1; }
          grep -q "Solution Strategy" /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Solution Strategy'"; exit 1; }
          grep -q "Building Block"    /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Building Block'";    exit 1; }
          grep -q "Deployment"        /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Deployment'";        exit 1; }
          grep -q "Risks"             /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Risks'";             exit 1; }
          grep -q "References"        /tmp/pdf-text.txt || { echo "FAIL: Missing section 'References'";        exit 1; }

          grep -qi "<h1" project.html || { echo "FAIL: Docker HTML missing heading content"; exit 1; }

          echo "All Docker validation checks passed."

      - name: Scan Docker image for vulnerabilities (Trivy)
        # Trivy scans the built image for known CVEs before it is pushed to the registry.
        # exit-code: 1 fails CI on CRITICAL or HIGH unfixed vulnerabilities — ensuring no
        # known high-severity vulnerabilities ship in the published image.
        # ignore-unfixed: true suppresses CVEs with no available fix (no actionable remediation).
        # trivyignores: .trivyignore — suppresses targeted CVEs with documented justifications
        # (see .trivyignore for the rationale for each entry).
        # OpenSSF Scorecard "Vulnerabilities" check — https://securityscorecards.dev
        # Reference: https://github.com/aquasecurity/trivy-action
        # Reference: https://aquasecurity.github.io/trivy/latest/docs/configuration/filtering/#trivyignore-format
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: daedalus:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          docker push ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          echo "Pushed ghcr.io/${{ github.repository }}:latest"
          echo "Pushed ghcr.io/${{ github.repository }}:${{ github.sha }}"

      - name: Push versioned Docker tag (on version tags)
        # When a vN.N.N tag is pushed, publish a human-readable version tag alongside the
        # immutable SHA-based tag. Consumers can pin to ghcr.io/owner/repo:v1.2.3 for
        # reproducible builds without tracking the full commit SHA.
        if: github.event_name != 'pull_request' && github.ref_type == 'tag'
        run: |
          docker tag "ghcr.io/${{ github.repository }}:${{ github.sha }}" \
                     "ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          docker push "ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          echo "Pushed ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
