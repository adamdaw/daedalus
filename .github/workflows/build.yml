name: Build & Validate PDF

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PANDOC_VERSION: 3.1.13
  CROSSREF_VERSION: 0.3.17.1

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Cache pandoc deb
        id: cache-pandoc
        uses: actions/cache@v4
        with:
          path: pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb
          key: pandoc-${{ env.PANDOC_VERSION }}

      - name: Download pandoc
        if: steps.cache-pandoc.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/jgm/pandoc/releases/download/${{ env.PANDOC_VERSION }}/pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb"

      - name: Install pandoc
        run: |
          sudo dpkg -i "pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb"
          pandoc --version

      - name: Install pandoc-crossref
        run: |
          wget -q "https://github.com/lierdakil/pandoc-crossref/releases/download/v${{ env.CROSSREF_VERSION }}/pandoc-crossref-Linux.tar.xz"
          tar -xf "pandoc-crossref-Linux.tar.xz"
          sudo mv pandoc-crossref /usr/local/bin/
          pandoc-crossref --version

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-texlive-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Install XeLaTeX and PDF utilities
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-extra \
            lmodern \
            poppler-utils

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-mermaid-filter-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Setup Chrome for mermaid-filter
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Install Node.js tools
        run: npm install -g mermaid-filter markdownlint-cli

      - name: Install Python tools
        run: pip install codespell

      - name: Lint markdown
        run: make lint

      - name: Spell check
        run: make spellcheck

      - name: Build PDF
        run: make build
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Validate PDF
        run: |
          test -s project.pdf || { echo "FAIL: PDF not generated or is empty"; exit 1; }

          pdfinfo project.pdf

          PAGES=$(pdfinfo project.pdf | awk '/^Pages:/{print $2}')
          echo "Page count: $PAGES"
          [ "$PAGES" -ge 5 ] || { echo "FAIL: Expected at least 5 pages, got $PAGES"; exit 1; }

          pdftotext project.pdf - > /tmp/pdf-text.txt
          grep -q "Introduction"      /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Introduction'";      exit 1; }
          grep -q "Current State"     /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Current State'";     exit 1; }
          grep -q "Proposed Solution" /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Proposed Solution'"; exit 1; }
          grep -q "Implementation"    /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Implementation'";    exit 1; }
          grep -q "Risks"             /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Risks'";             exit 1; }
          grep -q "References"        /tmp/pdf-text.txt || { echo "FAIL: Missing section 'References'";        exit 1; }

          echo "All validation checks passed."

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proposal-pdf
          path: project.pdf
          retention-days: 30

  docker:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: daedalus:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run build inside Docker
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/workspace" daedalus

      - name: Validate Docker PDF output
        run: |
          test -s project.pdf || { echo "FAIL: Docker build did not produce project.pdf"; exit 1; }
          echo "Docker build produced a valid PDF."
