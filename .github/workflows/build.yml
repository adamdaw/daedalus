name: Build & Validate PDF

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default all permissions to none; each job grants only what it needs.
permissions: {}

env:
  PANDOC_VERSION: 3.1.13
  # SHA-256 digests for supply-chain integrity — re-compute when upgrading versions
  PANDOC_SHA: b51029afd2e302679aabb9464cd96bda378145d48bb853bd32d93c57b93a293d
  CROSSREF_VERSION: 0.3.17.1
  CROSSREF_SHA: 52a21ef8945e664e7ccfea5f40268db3e3ddee4e7ce1f47f24716fea37c2410e

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # persist-credentials: false — removes the GITHUB_TOKEN git credential from the
          # git config after checkout. No git push is performed in this job; removing the
          # credential limits exposure if a subsequent step is compromised.
          # Reference: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
          persist-credentials: false
          # fetch-depth: 1 (shallow clone) — only the latest commit is needed for building.
          # Explicit declaration makes the intent auditable.
          fetch-depth: 1

      - name: Cache pandoc deb
        id: cache-pandoc
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb
          key: pandoc-${{ env.PANDOC_VERSION }}

      - name: Download pandoc
        if: steps.cache-pandoc.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o "pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb" \
            "https://github.com/jgm/pandoc/releases/download/${{ env.PANDOC_VERSION }}/pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb"

      - name: Install pandoc
        run: |
          echo "${{ env.PANDOC_SHA }}  pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb" | sha256sum -c -
          sudo dpkg -i "pandoc-${{ env.PANDOC_VERSION }}-1-amd64.deb"
          pandoc --version

      - name: Cache pandoc-crossref
        id: cache-crossref
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: pandoc-crossref-Linux.tar.xz
          key: pandoc-crossref-${{ env.CROSSREF_VERSION }}

      - name: Download pandoc-crossref
        if: steps.cache-crossref.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o pandoc-crossref-Linux.tar.xz \
            "https://github.com/lierdakil/pandoc-crossref/releases/download/v${{ env.CROSSREF_VERSION }}/pandoc-crossref-Linux.tar.xz"

      - name: Install pandoc-crossref
        run: |
          echo "${{ env.CROSSREF_SHA }}  pandoc-crossref-Linux.tar.xz" | sha256sum -c -
          tar -xf "pandoc-crossref-Linux.tar.xz"
          sudo mv pandoc-crossref /usr/local/bin/
          pandoc-crossref --version

      - name: Cache apt packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu-24.04-texlive-v1

      - name: Install XeLaTeX and PDF utilities
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-extra \
            lmodern \
            poppler-utils

      - name: Cache npm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: npm-mermaid-filter-1.4.7-markdownlint-0.44.0

      - name: Setup Chrome for mermaid-filter
        uses: browser-actions/setup-chrome@4f8e94349a351df0f048634f25fec36c3c91eded # v2.1.1
        id: setup-chrome

      - name: Configure puppeteer no-sandbox (Ubuntu 24.04 AppArmor)
        run: |
          echo '{"args":["--no-sandbox","--disable-setuid-sandbox"]}' > /tmp/puppeteer-config.json
          echo "MERMAID_FILTER_PUPPETEER_CONFIG=/tmp/puppeteer-config.json" >> $GITHUB_ENV
          echo "PUPPETEER_EXECUTABLE_PATH=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV
          echo "PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true" >> $GITHUB_ENV

      - name: Install Node.js tools
        run: npm install -g mermaid-filter@1.4.7 markdownlint-cli@0.44.0

      - name: Install Python tools
        run: pip install codespell==2.3.0

      - name: Lint markdown
        run: make lint

      - name: Spell check
        run: make spellcheck

      - name: Build PDF
        run: make build

      - name: Build HTML
        run: make html

      - name: Build DOCX
        run: make docx

      - name: Validate PDF
        run: |
          test -s project.pdf || { echo "FAIL: PDF not generated or is empty"; exit 1; }

          pdfinfo project.pdf

          PAGES=$(pdfinfo project.pdf | awk '/^Pages:/{print $2}')
          echo "Page count: $PAGES"
          [ "$PAGES" -ge 5 ] || { echo "FAIL: Expected at least 5 pages, got $PAGES"; exit 1; }

          pdftotext project.pdf - > /tmp/pdf-text.txt
          grep -q "Introduction"     /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Introduction'";     exit 1; }
          grep -q "Context"          /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Context'";          exit 1; }
          grep -q "Solution Strategy" /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Solution Strategy'"; exit 1; }
          grep -q "Building Block"   /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Building Block'";   exit 1; }
          grep -q "Deployment"       /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Deployment'";       exit 1; }
          grep -q "Risks"            /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Risks'";            exit 1; }
          grep -q "References"       /tmp/pdf-text.txt || { echo "FAIL: Missing section 'References'";       exit 1; }

          echo "All validation checks passed."

      - name: Upload PDF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: proposal-pdf
          path: project.pdf
          retention-days: 30

      - name: Validate HTML
        run: |
          test -s project.html || { echo "FAIL: HTML not generated or is empty"; exit 1; }
          grep -qi "<h1" project.html || { echo "FAIL: HTML missing heading content"; exit 1; }
          echo "HTML validation passed."

      - name: Upload HTML artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: proposal-html
          path: project.html
          retention-days: 30

      - name: Validate DOCX
        run: |
          test -s project.docx || { echo "FAIL: DOCX not generated or is empty"; exit 1; }
          echo "DOCX validation passed."

      - name: Upload DOCX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: proposal-docx
          path: project.docx
          retention-days: 30

  docker:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: |
            daedalus:latest
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run build inside Docker
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/workspace" daedalus

      - name: Install PDF utilities
        run: sudo apt-get install -y --no-install-recommends poppler-utils

      - name: Validate Docker outputs
        run: |
          test -s project.pdf  || { echo "FAIL: Docker build did not produce project.pdf";  exit 1; }
          test -s project.html || { echo "FAIL: Docker build did not produce project.html"; exit 1; }
          test -s project.docx || { echo "FAIL: Docker build did not produce project.docx"; exit 1; }

          pdfinfo project.pdf

          PAGES=$(pdfinfo project.pdf | awk '/^Pages:/{print $2}')
          echo "Page count: $PAGES"
          [ "$PAGES" -ge 5 ] || { echo "FAIL: Expected at least 5 pages, got $PAGES"; exit 1; }

          pdftotext project.pdf - > /tmp/pdf-text.txt
          grep -q "Introduction"      /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Introduction'";      exit 1; }
          grep -q "Context"           /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Context'";           exit 1; }
          grep -q "Solution Strategy" /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Solution Strategy'"; exit 1; }
          grep -q "Building Block"    /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Building Block'";    exit 1; }
          grep -q "Deployment"        /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Deployment'";        exit 1; }
          grep -q "Risks"             /tmp/pdf-text.txt || { echo "FAIL: Missing section 'Risks'";             exit 1; }
          grep -q "References"        /tmp/pdf-text.txt || { echo "FAIL: Missing section 'References'";        exit 1; }

          grep -qi "<h1" project.html || { echo "FAIL: Docker HTML missing heading content"; exit 1; }

          echo "All Docker validation checks passed."

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          docker push ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          echo "Pushed ghcr.io/${{ github.repository }}:latest"
          echo "Pushed ghcr.io/${{ github.repository }}:${{ github.sha }}"
