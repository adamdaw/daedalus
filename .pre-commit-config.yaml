repos:
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: ["--config", ".markdownlint.json"]
        files: "(markdown|proposals/.+/markdown)/.*\\.md$"

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args: ["--skip=*.bib,*.pdf,*.html,project.tex,project.css"]
        files: "(markdown|proposals/.+/markdown)/.*\\.md$"
